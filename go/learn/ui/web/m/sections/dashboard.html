<script>
function initMobileDashboard() {
    loadDashboardStats();
    Layer8MNav.showHome();
}

async function loadDashboardStats() {
    var kpis = [
        { id: 'stat-students', endpoint: '/20/Student', query: 'select * from Student limit 1 page 0' },
        { id: 'stat-courses', endpoint: '/10/Course', query: 'select * from Course limit 1 page 0' },
        { id: 'stat-lessons', endpoint: '/10/Lesson', query: 'select * from Lesson limit 1 page 0' },
        { id: 'stat-activities', endpoint: '/10/Activity', query: 'select * from Activity limit 1 page 0' },
        { id: 'stat-skills', endpoint: '/30/Skill', query: 'select * from Skill limit 1 page 0' },
        { id: 'stat-scores', endpoint: '/40/Score', query: 'select * from Score limit 1 page 0' },
        { id: 'stat-benchmarks', endpoint: '/40/Benchmark', query: 'select * from Benchmark limit 1 page 0' },
        { id: 'stat-groups', endpoint: '/70/Collab', query: 'select * from CollabGroup limit 1 page 0' }
    ];

    await Promise.all(kpis.map(function(kpi) { return loadKPI(kpi); }));
}

async function loadKPI(kpi) {
    try {
        var body = encodeURIComponent(JSON.stringify({ text: kpi.query }));
        var response = await Layer8MAuth.get(Layer8MConfig.resolveEndpoint(kpi.endpoint) + '?body=' + body);

        var element = document.getElementById(kpi.id);
        if (element) {
            if (response && response.metadata && response.metadata.keyCount && response.metadata.keyCount.counts) {
                element.textContent = response.metadata.keyCount.counts.Total || 0;
            } else {
                element.textContent = '0';
            }
        }
    } catch (error) {
        console.error('Failed to load KPI ' + kpi.id + ':', error);
        var el = document.getElementById(kpi.id);
        if (el) {
            el.textContent = '0';
        }
    }
}
</script>
