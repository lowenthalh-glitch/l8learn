# L8Learn — GKE deployment (GCE Persistent Disk, shared PVC)
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: learn-storage
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-standard
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: learn
  name: learn-data
  labels:
    app: learn
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: learn-storage
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Namespace
metadata:
  name: learn-vnet
  labels:
    name: learn-vnet
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: learn-vnet
  name: learn-vnet
  labels:
    app: learn-vnet
spec:
  selector:
    matchLabels:
      app: learn-vnet
  template:
    metadata:
      labels:
        app: learn-vnet
    spec:
      hostNetwork: true
      containers:
        - name: learn-vnet
          image: saichler/l8learn-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          persistentVolumeClaim:
            claimName: learn-data
---
apiVersion: v1
kind: Namespace
metadata:
  name: learn-logs
  labels:
    name: learn-logs
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: learn-logs
  name: learn-logs-vnet
  labels:
    app: learn-logs-vnet
spec:
  selector:
    matchLabels:
      app: learn-logs-vnet
  template:
    metadata:
      labels:
        app: learn-logs-vnet
    spec:
      hostNetwork: true
      containers:
        - name: learn-logs-vnet
          image: saichler/l8learn-logs-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          persistentVolumeClaim:
            claimName: learn-data
---
apiVersion: v1
kind: Namespace
metadata:
  name: learn
  labels:
    name: learn
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: learn
  name: learn
  labels:
    app: learn
spec:
  serviceName: learn
  replicas: 1
  selector:
    matchLabels:
      app: learn
  template:
    metadata:
      labels:
        app: learn
    spec:
      containers:
        - name: learn
          image: saichler/l8learn:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          persistentVolumeClaim:
            claimName: learn-data
---
apiVersion: v1
kind: Namespace
metadata:
  name: learn-web
  labels:
    name: learn-web
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: learn-web
  name: learn-web
  labels:
    app: learn-web
spec:
  selector:
    matchLabels:
      app: learn-web
  template:
    metadata:
      labels:
        app: learn-web
    spec:
      hostNetwork: true
      containers:
        - name: learn-web
          image: saichler/l8learn-web:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          persistentVolumeClaim:
            claimName: learn-data
---
apiVersion: v1
kind: Namespace
metadata:
  name: learn-log-agent
  labels:
    name: learn-log-agent
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: learn-log-agent
  name: learn-log-agent
  labels:
    app: learn-log-agent
spec:
  selector:
    matchLabels:
      app: learn-log-agent
  template:
    metadata:
      labels:
        app: learn-log-agent
    spec:
      containers:
        - name: learn-log-agent
          image: saichler/l8learn-log-agent:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: LOGPATH
              value: /data/logs/l8learn
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          persistentVolumeClaim:
            claimName: learn-data
