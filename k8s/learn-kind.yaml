# L8Learn — KIND cluster version
# KIND ships with rancher/local-path-provisioner pre-installed as StorageClass "standard"
# No custom StorageClass definition needed.
---
apiVersion: v1
kind: Namespace
metadata:
  name: learn-vnet
  labels:
    name: learn-vnet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: learn-vnet
  name: learn-vnet
  labels:
    app: learn-vnet
spec:
  serviceName: learn-vnet
  replicas: 2
  selector:
    matchLabels:
      app: learn-vnet
  template:
    metadata:
      labels:
        app: learn-vnet
    spec:
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: learn-vnet
              topologyKey: kubernetes.io/hostname
      containers:
        - name: learn-vnet
          image: saichler/l8learn-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
